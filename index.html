  :root {

  .hdr { text-align:center; margin-bottom:14px; }
  .hdr h1 { font-family:'Playfair Display',serif; font-size:2rem; color:var(--pink); font-weight:600; }
  .hdr p { color:var(--txt2); font-size:0.9rem; margin-top:4px; }

  .box {

    background:#fff; border-radius:16px; box-shadow:0 12px 48px rgba(233,30,140,0.18);
    display:flex; flex-direction:column; overflow:hidden; border:1px solid var(--bdr);

  .box-hdr {
    background:linear-gradient(135deg, var(--pink), var(--pink-dark));
    color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; flex-shrink:0;

  .ava { width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:20px; border:2px solid rgba(255,255,255,0.3); flex-shrink:0; }
  .box-hdr h2 { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:600; }
  .box-hdr .sub { font-size:0.72rem; opacity:0.8; margin-top:2px; }
  .dot { width:7px; height:7px; background:#4ADE80; border-radius:50%; display:inline-block; margin-right:4px; }
  .tabs { margin-left:auto; display:flex; gap:3px; padding:3px; background:rgba(255,255,255,0.15); border-radius:18px; }
  .tab { padding:5px 11px; border:none; border-radius:15px; font-size:0.7rem; font-weight:500; cursor:pointer; font-family:inherit; color:rgba(255,255,255,0.65); background:transparent; transition:all 0.2s; }
  .tab.on { background:rgba(255,255,255,0.25); color:#fff; }
  .tab:hover { color:#fff; }

  .msgs {
    flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px;

  .msgs::-webkit-scrollbar { width:4px; }
  .msgs::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:4px; }

  .m.bot { align-self:flex-start; }
  .m.usr { align-self:flex-end; flex-direction:row-reverse; }
  .m-ava { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .m.bot .m-ava { background:linear-gradient(135deg, var(--pink), var(--pink-light)); color:#fff; }
  .m.usr .m-ava { background:#FFD6EE; }
  .m-body { max-width:calc(100% - 39px); }
  .bub { padding:11px 15px; border-radius:18px; font-size:0.88rem; line-height:1.5; word-wrap:break-word; }
  .m.bot .bub { background:var(--rose); border-bottom-left-radius:4px; }
  .m.usr .bub { background:linear-gradient(135deg, var(--pink), var(--pink-light)); color:#fff; border-bottom-right-radius:4px; }
  .bub strong { color:var(--pink); }
  .m.usr .bub strong { color:#FFD6EE; }

  .dots span:nth-child(3) { animation-delay:0.3s; }

  .acts { display:flex; flex-wrap:wrap; gap:7px; margin-top:9px; }
  .abtn {

  .faq-ans { padding:0 13px 10px; font-size:0.8rem; color:var(--txt2); line-height:1.55; display:none; }

    return botReply("D\u00edky za dotaz! Mohu v\u00e1m poradit s v\u00fdb\u011brem make-upu, p\u00e9\u010d\u00ed o ple\u0165, rt\u011bnkami a dal\u0161\u00edm. Zkuste mi popsat, co hled\u00e1te, nebo si prohl\u00e9dn\u011bte kategorie.", addActions);

  function callAI(msg, cb) {
    chatLog.push({role: "user", content: msg});
    fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({model: "claude-sonnet-4-20250514", max_tokens: 800, system: AI_SYS, messages: chatLog.slice(-10)})
    }).then(function(r) {
      if (!r.ok) throw new Error("API error " + r.status);
      return r.json();
    }).then(function(d) {
      var t = (d.content && d.content[0]) ? d.content[0].text : null;
      if (t) { chatLog.push({role: "assistant", content: t}); }
      cb(t);
    }).catch(function() { cb(null); });
  }

  function sanitize(txt) {
    txt = txt.substring(0, 500);
    txt = txt.replace(/<[^>]*>/g, "");
    txt = txt.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, "");
    txt = txt.replace(/[\u200B-\u200F\u2028-\u202F\u2060\uFEFF\uFFF9-\uFFFB]/g, "");
    txt = txt.replace(/(.)\1{19,}/g, "$1$1$1");
    return txt.trim();
  }

  var lastSendTime = 0;
  var sendCount = 0;
  var sendWindow = 0;

  function send() {
    var now = Date.now();
    if (now - sendWindow > 60000) { sendCount = 0; sendWindow = now; }
    if (now - lastSendTime < 1500) { return; }
    if (sendCount >= 15) { botReply("P\u0159\u00edli\u0161 mnoho dotaz\u016f. Vy\u010dkejte pros\u00edm chvilku."); return; }
    lastSendTime = now;
    sendCount++;
    var txt = sanitize(inpEl.value);
    if (!txt) { return; }
    inpEl.value = "";
    inpEl.disabled = true;
    sendEl.disabled = true;
    addUsr(txt);

    callAI(txt, function(aiReply) {
      if (aiReply) {
        var found = findProdsInReply(aiReply);
        if (found.length === 0) found = findProds(txt);
        var show = Math.min(found.length, 3);
        botReply(aiReply, function(b) { for (var i = 0; i < show; i++) { addProduct(b, found[i]); } });
      } else {
        processInput(txt);
      }
    });
  }

  sendEl.addEventListener("click", send);
  inpEl.addEventListener("keydown", function(e) { if (e.key === "Enter") { send(); } });
