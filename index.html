<style>

    display:flex; flex-direction:column; align-items:center; padding:16px;

  .hdr { text-align:center; margin-bottom:14px; }
  .hdr h1 { font-family:'Playfair Display',serif; font-size:2rem; color:var(--pink); font-weight:600; }
  .hdr p { color:var(--txt2); font-size:0.9rem; margin-top:4px; }

  .box {
    width:100%; max-width:480px; height:calc(100vh - 120px); max-height:700px;
    background:#fff; border-radius:16px; box-shadow:0 12px 48px rgba(233,30,140,0.18);
    display:flex; flex-direction:column; overflow:hidden; border:1px solid var(--bdr);
  }
  .box-hdr {
    background:linear-gradient(135deg, var(--pink), var(--pink-dark));
    color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; flex-shrink:0;
  }
  .ava { width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:20px; border:2px solid rgba(255,255,255,0.3); flex-shrink:0; }
  .box-hdr h2 { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:600; }
  .box-hdr .sub { font-size:0.72rem; opacity:0.8; margin-top:2px; }
  .dot { width:7px; height:7px; background:#4ADE80; border-radius:50%; display:inline-block; margin-right:4px; }
  .tabs { margin-left:auto; display:flex; gap:3px; padding:3px; background:rgba(255,255,255,0.15); border-radius:18px; }
  .tab { padding:5px 11px; border:none; border-radius:15px; font-size:0.7rem; font-weight:500; cursor:pointer; font-family:inherit; color:rgba(255,255,255,0.65); background:transparent; transition:all 0.2s; }
  .tab.on { background:rgba(255,255,255,0.25); color:#fff; }
  .tab:hover { color:#fff; }

  .msgs {
    flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px;
    scroll-behavior:smooth; background:linear-gradient(180deg, var(--rose) 0%, #fff 30%);
  }
  .msgs::-webkit-scrollbar { width:4px; }
  .msgs::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:4px; }

  .m { display:flex; gap:9px; max-width:90%; animation:mIn 0.3s ease; }
  .m.bot { align-self:flex-start; }
  .m.usr { align-self:flex-end; flex-direction:row-reverse; }
  .m-ava { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .m.bot .m-ava { background:linear-gradient(135deg, var(--pink), var(--pink-light)); color:#fff; }
  .m.usr .m-ava { background:#FFD6EE; }
  .m-body { max-width:calc(100% - 39px); }
  .bub { padding:11px 15px; border-radius:18px; font-size:0.88rem; line-height:1.5; word-wrap:break-word; }
  .m.bot .bub { background:var(--rose); border-bottom-left-radius:4px; }
  .m.usr .bub { background:linear-gradient(135deg, var(--pink), var(--pink-light)); color:#fff; border-bottom-right-radius:4px; }
  .bub strong { color:var(--pink); }
  .m.usr .bub strong { color:#FFD6EE; }

  .dots { display:flex; gap:4px; }
  .dots span { width:6px; height:6px; background:var(--pink-light); border-radius:50%; opacity:0.4; animation:dotB 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay:0.15s; }
  .dots span:nth-child(3) { animation-delay:0.3s; }

  .acts { display:flex; flex-wrap:wrap; gap:7px; margin-top:9px; }
  .abtn {
    display:inline-flex; align-items:center; gap:5px; padding:7px 13px;
    background:#fff; border:1.5px solid var(--bdr); border-radius:22px;
    font-size:0.8rem; font-weight:500; color:var(--pink); cursor:pointer;

  .abtn:hover { background:var(--pink); color:#fff; border-color:var(--pink); transform:translateY(-1px); }

  .crumb { display:flex; align-items:center; gap:4px; font-size:0.73rem; color:var(--txt2); margin-bottom:6px; flex-wrap:wrap; }
  .crumb span { cursor:pointer; color:var(--pink); text-decoration:underline; }

  .pc {

    border:1.5px solid var(--bdr); border-radius:9px; margin-top:7px; cursor:pointer; transition:all 0.2s;

  .pc-desc { font-size:0.78rem; color:var(--txt2); margin-top:4px; line-height:1.4; }
  .pc-info { flex:1; min-width:0; }
  .pc-name { font-weight:600; font-size:0.83rem; }
  .pc-sub { font-size:0.7rem; color:var(--txt2); margin-top:1px; }
  .pc-bot { display:flex; justify-content:space-between; align-items:center; margin-top:5px; }
  .pc-price { font-weight:700; font-size:0.92rem; color:var(--pink); }
  .pc-rate { font-size:0.7rem; color:#E9A820; font-weight:500; }
  .tag { display:inline-block; padding:1px 6px; background:var(--pink); color:#fff; border-radius:3px; font-size:0.58rem; font-weight:700; letter-spacing:0.04em; margin-left:5px; vertical-align:middle; }

  .tip {
    background:linear-gradient(135deg, var(--rose), var(--cream));
    border-left:3px solid var(--pink); padding:9px 13px;
    border-radius:0 9px 9px 0; margin-top:7px; font-size:0.8rem; line-height:1.55;

  .tip-t { font-weight:600; color:var(--pink); font-size:0.76rem; margin-bottom:3px; }

  .faq-i { border:1.5px solid var(--bdr); border-radius:9px; margin-top:5px; overflow:hidden; }
  .faq-q { display:flex; align-items:center; justify-content:space-between; padding:9px 13px; cursor:pointer; font-size:0.83rem; font-weight:500; color:var(--pink); background:#fff; border:none; width:100%; text-align:left; font-family:inherit; }

  .faq-ans { padding:0 13px 10px; font-size:0.8rem; color:var(--txt2); line-height:1.55; display:none; }

  var msgsEl = document.getElementById("msgs");
  var inpEl = document.getElementById("inp");
  var sendEl = document.getElementById("sendBtn");
  var treePath = [];

  function scrollDown() {
    setTimeout(function() { msgsEl.scrollTop = msgsEl.scrollHeight; }, 60);
  }

  function fmt(t) {
    return t.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/\n/g, "<br>");
  }

  function prodWord(n) {
    if (n === 1) return "produkt";
    if (n >= 2 && n <= 4) return "produkty";
    return "produkt\u016f";
  }

  function addBot(html, extFn) {
    var row = document.createElement("div");
    row.className = "m bot";
    row.innerHTML = '<div class="m-ava">D</div><div class="m-body"><div class="bub">' + fmt(html) + "</div></div>";
    if (extFn) { extFn(row.querySelector(".m-body")); }
    msgsEl.appendChild(row);
    scrollDown();
  }

  function addUsr(txt) {
    var row = document.createElement("div");
    row.className = "m usr";
    row.innerHTML = '<div class="m-ava">?</div><div class="m-body"><div class="bub"></div></div>';
    row.querySelector(".bub").textContent = txt;
    msgsEl.appendChild(row);
    scrollDown();
  }

  function showTyping() {
    var row = document.createElement("div");
    row.className = "m bot";
    row.id = "typing";
    row.innerHTML = '<div class="m-ava">D</div><div class="m-body"><div class="bub"><div class="dots"><span></span><span></span><span></span></div></div></div>';
    msgsEl.appendChild(row);
    scrollDown();
  }

  function hideTyping() {
    var el = document.getElementById("typing");
    if (el) { el.parentNode.removeChild(el); }
  }

  function botReply(html, extFn) {
    showTyping();
    var delay = Math.min(500 + (html || "").length * 2, 1400);
    setTimeout(function() {
      hideTyping();
      addBot(html, extFn);
      inpEl.disabled = false;
      sendEl.disabled = false;
      inpEl.focus();
    }, delay);
  }

  function addActions(parent) {
    var d = document.createElement("div");
    d.className = "acts";
    var items = [["Proch\u00e1zet kategorie","browse"],["Poradna pro ple\u0165","skin"],["Bestsellery","best"],["\u010cast\u00e9 dotazy","faq"]];
    for (var i = 0; i < items.length; i++) {
      (function(x) {
        var b = document.createElement("button");
        b.className = "abtn";
        b.textContent = x[0];
        b.addEventListener("click", function() { doAction(x[1]); });
        d.appendChild(b);
      })(items[i]);
    }
    parent.appendChild(d);
  }

  function addProduct(parent, p) {
    var card = document.createElement("div");
    card.className = "pc";
    card.addEventListener("click", function() { window.open("https://www.dermacol.cz/" + p.id + "/", "_blank"); });
    var tagH = (p.t && p.t[0]) ? '<span class="tag">' + p.t[0] + "</span>" : "";
    var imgUrl = p.img || "";
    var imgEl = imgUrl.indexOf("http") === 0 ? '<div class="pc-img"><img src="' + imgUrl + '" alt="' + p.n + '" onerror="this.parentElement.style.background=\'linear-gradient(135deg,#E91E8C,#FF6BB5)\';this.parentElement.textContent=\'' + (p.n.charAt(0) || "D") + '\';this.remove();" /></div>' : '<div class="pc-img" style="background:linear-gradient(135deg,#E91E8C,#FF6BB5);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.7rem">' + (imgUrl || "D") + '</div>';
    var adviceH = p.advice ? '<div class="pc-desc">' + p.advice + '</div>' : '';
    card.innerHTML = imgEl + '<div class="pc-info"><div class="pc-name">' + p.n + tagH + '</div><div class="pc-sub">' + p.s + '</div>' + adviceH + '<div class="pc-bot"><span class="pc-price">' + p.p + ' K\u010d</span><span class="pc-rate">\u2605 ' + p.r + " (" + p.rc + ")</span></div></div>";
    parent.appendChild(card);
  }

  function addTip(parent, title, text) {
    var t = document.createElement("div");
    t.className = "tip";
    t.innerHTML = '<div class="tip-t">' + title + "</div>" + text;
    parent.appendChild(t);
  }

  function findCat(list, id) {
    for (var i = 0; i < list.length; i++) {
      if (list[i].id === id) { return list[i]; }
    }
    return null;
  }

  function addTree(parent, items, path) {
    var nav = document.createElement("div");
    if (path.length > 0) {
      var cr = document.createElement("div");
      cr.className = "crumb";
      var s0 = document.createElement("span");
      s0.textContent = "Kategorie";
      s0.addEventListener("click", function() { rebuildTree(parent, 0); });
      cr.appendChild(s0);
      var cur = CATS;
      for (var i = 0; i < path.length; i++) {
        cr.appendChild(document.createTextNode(" > "));
        var found = findCat(cur, path[i]);
        if (found) {
          var sp = document.createElement("span");
          sp.textContent = found.n;
          (function(idx) { sp.addEventListener("click", function() { rebuildTree(parent, idx + 1); }); })(i);
          cr.appendChild(sp);
          cur = found.ch || [];
        }
      }
      nav.appendChild(cr);
    }
    for (var j = 0; j < items.length; j++) {
      (function(cat) {
        var ti = document.createElement("div");
        ti.className = "ti";
        var left = '<div class="ti-l"><span class="ti-i">' + (cat.i || "\uD83D\uDC8E") + "</span><div><div class='ti-n'>" + cat.n + "</div>" + (cat.d ? "<div class='ti-d'>" + cat.d + "</div>" : "") + "</div></div>";
        ti.innerHTML = left + (cat.ch ? '<span class="ti-a">&gt;</span>' : "");
        ti.addEventListener("click", function() { clickTree(parent, cat); });
        nav.appendChild(ti);
      })(items[j]);
    }
    parent.appendChild(nav);
  }

  function rebuildTree(parent, level) {
    treePath = treePath.slice(0, level);
    while (parent.children.length > 1) { parent.removeChild(parent.lastChild); }
    var items = CATS;
    for (var i = 0; i < treePath.length; i++) {
      var f = findCat(items, treePath[i]);
      if (f && f.ch) { items = f.ch; }
    }
    addTree(parent, items, treePath);
    scrollDown();
  }

  function clickTree(parent, cat) {
    if (cat.ch) {
      treePath.push(cat.id);
      while (parent.children.length > 1) { parent.removeChild(parent.lastChild); }
      var items = CATS;
      for (var i = 0; i < treePath.length; i++) {
        var f = findCat(items, treePath[i]);
        if (f && f.ch) { items = f.ch; }
      }
      addTree(parent, items, treePath);
      scrollDown();
    } else {
      var found = [];
      for (var j = 0; j < PRODS.length; j++) {
        if (PRODS[j].c === cat.id) { found.push(PRODS[j]); }
      }
      if (found.length > 0) {
        var countText = "Na\u0161la jsem " + found.length + " " + prodWord(found.length) + " v kategorii **" + cat.n + "**:";
        botReply(countText, function(body) {
          for (var k = 0; k < found.length; k++) { addProduct(body, found[k]); }
          addTip(body, "Pot\u0159ebujete poradit?", "Napi\u0161te mi v\u00e1\u0161 typ pleti nebo p\u0159\u00edle\u017eitost a j\u00e1 v\u00e1m doporu\u010d\u00edm ten nejlep\u0161\u00ed produkt!");
        });
      } else {
        var advice = CAT_ADVICE[cat.id] || "R\u00e1da v\u00e1m porad\u00edm s v\u00fdb\u011brem v kategorii **" + cat.n + "**. Co p\u0159esn\u011b hled\u00e1te?";
        botReply(advice, function(body) {
          var acts = document.createElement("div");
          acts.className = "acts";
          var opts = [["Napi\u0161te mi v\u00edce","info_" + cat.id],["Zobrazit v\u0161e na webu","web_" + cat.id]];
          for (var i = 0; i < opts.length; i++) {
            (function(x) {
              var b = document.createElement("button");
              b.className = "abtn";
              b.textContent = x[0];
              b.addEventListener("click", function() {
                if (x[1].indexOf("web_") === 0) {
                  window.open("https://www.dermacol.cz/kategorie/" + cat.id + "/", "_blank");
                } else {
                  addUsr("Chci v\u011bd\u011bt v\u00edce o " + cat.n);
                  botReply("Kompletni nab\u00eddku kategorie **" + cat.n + "** najdete na dermacol.cz. R\u00e1da v\u00e1m ale porad\u00edm \u2013 napi\u0161te mi, co hled\u00e1te, jak\u00fd m\u00e1te typ pleti, nebo pro jakou p\u0159\u00edle\u017eitost produkt pot\u0159ebujete.", addActions);
                }
              });
              acts.appendChild(b);
            })(opts[i]);
          }
          body.appendChild(acts);
        });
      }
    }
  }

  function addFAQ(parent) {
    for (var i = 0; i < FAQ.length; i++) {
      var cat = FAQ[i];
      var h = document.createElement("div");
      h.className = "faq-cat";
      h.textContent = cat.c;
      parent.appendChild(h);
      for (var j = 0; j < cat.items.length; j++) {
        (function(item) {
          var fi = document.createElement("div");
          fi.className = "faq-i";
          var ans = document.createElement("div");
          ans.className = "faq-ans";
          ans.textContent = item.a;
          var q = document.createElement("button");
          q.className = "faq-q";
          q.innerHTML = "<span>" + item.q + "</span><span>+</span>";
          q.addEventListener("click", function() {
            var isOpen = ans.style.display === "block";
            ans.style.display = isOpen ? "none" : "block";
            q.querySelector("span:last-child").textContent = isOpen ? "+" : "-";
          });
          fi.appendChild(q);
          fi.appendChild(ans);
          parent.appendChild(fi);
        })(cat.items[j]);
      }
    }
  }

    if (act === "browse") {
      treePath = [];
      inTreeMode = true;
      botReply("Kategorie produkt\u016f Dermacol. Klikn\u011bte pro proch\u00e1zen\u00ed:", function(body) {
        addTree(body, CATS, []);
      });
    } else if (act === "skin") {
      addUsr("Porad\u00edte mi s p\u00e9\u010d\u00ed o ple\u0165?");

        for (var i = 0; i < skinTypes.length; i++) {
          (function(x) {
            var b = document.createElement("button");
            b.className = "abtn";
            b.textContent = x[0];
            b.addEventListener("click", function() { addUsr(x[0]); processInput(x[1]); });

        }
        body.appendChild(acts);
      });
    } else if (act === "best") {
      addUsr("Uka\u017ete mi bestsellery");
      var bests = [];
      for (var i = 0; i < PRODS.length; i++) {
        if (PRODS[i].t.indexOf("BESTSELLER") >= 0) { bests.push(PRODS[i]); }
      }
      botReply("Na\u0161e nejoblíben\u011bj\u0161\u00ed produkty:", function(body) {
        for (var j = 0; j < bests.length; j++) { addProduct(body, bests[j]); }

    q = q.toLowerCase();

      var words = q.split(/\s+/);
      for (var w = 0; w < words.length; w++) {
        if (words[w].length > 2 && s.indexOf(words[w]) >= 0) {
          result.push(p);
          break;
        }
      }
    }
    return result;
  }
